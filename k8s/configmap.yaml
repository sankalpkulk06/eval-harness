apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-eval-pipeline-config
  namespace: default
data:
  pipeline.yaml: |
    name: pipeline_a
    retriever:
      type: pinecone
      index_name: rag-eval-index
      top_k: 3
    generator:
      type: openai
      model: gpt-4o
    metrics:
      - type: latency
      - type: ragas_faithfulness
      - type: llm_judge
